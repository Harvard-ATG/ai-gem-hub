<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - AI Bot Catalog Prototype</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ url_for('index') }}">
                <span class="header-logo">✨</span>
            </a>
            <div class="header-text">
                <h1>Report Issue</h1>
                <p class="subtitle">{{ gem.name }}</p>
            </div>
        </header>

        <section class="section">
            <form class="admin-form" method="POST">
                <div class="form-group">
                    <label for="bot_name">Bot</label>
                    <input type="text" id="bot_name" value="{{ gem.name }}" readonly style="background: #f5f5f5; color: #666;">
                </div>

                <div class="form-group">
                    <label for="reporter_name">Your Name</label>
                    <input type="text" id="reporter_name" name="reporter_name" required>
                </div>

                <div class="form-group">
                    <label for="reporter_email">Your Email</label>
                    <input type="email" id="reporter_email" name="reporter_email" required>
                </div>

                <div class="form-group">
                    <label for="issue_type">Issue Type</label>
                    <select id="issue_type" name="issue_type" required>
                        <option value="">Select an issue type...</option>
                        <option value="Broken Link">Broken Link</option>
                        <option value="Inaccurate Info">Inaccurate Info</option>
                        <option value="Inappropriate Content">Inappropriate Content</option>
                        <option value="Not Working">Not Working</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Submit Report</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
